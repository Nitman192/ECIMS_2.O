version: "3.8"
services:
  ecims-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.production.template
    volumes:
      - ./configs:/opt/ecims/configs:ro
      - ./data:/opt/ecims/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
