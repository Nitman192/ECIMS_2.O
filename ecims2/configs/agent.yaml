server_url: "https://<SERVER_IP>:8010"
agent_name: "endpoint-01"
hostname: "host-01"
monitored_paths:
  - "/tmp"
scan_interval_sec: 30
enrollment_token: null
runtime_id: "endpoint-01"
state_dir: ".ecims_agent_runtime"

# Optional auto-discovery when server_url is missing/unreachable.
auto_discovery_enabled: false
discovery_timeout_sec: 3
discovery_lan_broadcast_enabled: true
discovery_udp_port: 40110
discovery_broadcast_targets:
  - "255.255.255.255"
discovery_mdns_enabled: true
discovery_mdns_service_type: "_ecims._tcp.local."

# mTLS client auth (use either PEM pair or PFX)
agent_client_cert_path: "configs/tls/agent.crt"
agent_client_key_path: "configs/tls/agent.key"
agent_pfx_path: null
agent_pfx_password: null

# Server trust + pinning
server_ca_bundle_path: "configs/tls/server_ca.crt"
server_cert_pin_sha256: ""
pinning_required: true
allow_plain_https: false

# Device control enforcement pilot
# observe: report-only/would-block
# enforce: attempt block via OS adapter
device_enforcement_mode: "observe"
command_poll_interval_sec: 15
failsafe_offline_minutes: 5
token_public_key_path: "configs/device_allow_token_public.pem"
local_event_queue_retention_hours: 72
enforcement_grace_seconds: 0
