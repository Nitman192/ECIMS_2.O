name: ECIMS 2.0 CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r ecims2/server/requirements.txt
          python -m pip install httpx cryptography

      - name: Compile check (py_compile)
        run: |
          python -m py_compile ecims2/server/app/main.py
          python -m py_compile ecims2/server/app/core/config.py
          python -m py_compile ecims2/server/app/security/storage_crypto.py

      - name: Run full unittest suite
        env:
          PYTHONPATH: server
        run: |
          cd ecims2
          python -m unittest -v \
            server.tests.test_phase1_smoke \
            server.tests.test_phase2_controls \
            server.tests.test_phase3_ai \
            server.tests.test_security_controls \
            server.tests.test_phase5_storage_crypto \
            server.tests.test_phase5_startup_encryption
